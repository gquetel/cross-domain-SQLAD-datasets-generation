[general]
# Generated dataset path
output_path = "dataset.csv"

# Ratio of attacks in the test set. This does not modify the final number of
# attack in the dataset but the number of generated normal samples to reach the
# ratio value.
attacks_ratio = 0.1

# Ratio of query templates reserved for normal-only generation (never used to
# generate attacks). These templates ensure diversity between attack and normal
# samples, testing detection systems against unseen-during-attack query patterns.
# Can be set to 0 to disable this behavior.
normal_only_template_ratio = 0.1

# Seed to have constance in template selection or normal values selection.
seed = 42

[mysql]
# user and password used for interacting with the mysql server. By default, it
# consists of the unprivileged user created by the provided data/bootstrap.sql
# script.
user = "tata"
password = "tata"
host = "localhost"
port = 61337

# Password for MySQL root user, required for : 
# - `pt-kill` command executed between each attack campaign.
# - `log-level command` to enable logging of queries.
priv_user = "root"
priv_pwd = "root"

